<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — ContractVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

<div class="flash-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">
        <span>{{ message }}</span>
        <button class="flash-close">×</button>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-mark">CV</div>
    <div class="auth-logo-text">ContractVault</div>
  </div>

  <h1 class="auth-title">Create your account</h1>
  <p class="auth-subtitle">Start managing contracts in minutes</p>

  <form method="POST" action="{{ url_for('register') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label class="form-label">Full Name <span class="required">*</span></label>
      <input type="text" name="full_name" class="form-control" placeholder="Jane Smith" required autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">Email Address <span class="required">*</span></label>
      <input type="email" name="email" class="form-control" placeholder="jane@company.com" required>
    </div>

    <div class="form-group">
      <label class="form-label">Password <span class="required">*</span></label>
      <input type="password" name="password" class="form-control" placeholder="At least 8 characters" required minlength="8">
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password <span class="required">*</span></label>
      <input type="password" name="confirm_password" class="form-control" placeholder="Repeat your password" required>
    </div>

    <button type="submit" class="btn btn-navy btn-lg" style="width:100%;justify-content:center;margin-top:4px">
      Create Account
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
