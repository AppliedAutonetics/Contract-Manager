<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — ContractVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">

<div class="flash-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">
        <span>{{ message }}</span>
        <button class="flash-close">×</button>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-mark">CV</div>
    <div class="auth-logo-text">ContractVault</div>
  </div>

  <h1 class="auth-title">Welcome back</h1>
  <p class="auth-subtitle">Sign in to manage your contracts</p>

  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" name="email" class="form-control" placeholder="you@company.com" required autofocus>
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
    </div>

    <div class="flex items-center justify-between" style="margin-bottom:20px">
      <label class="flex items-center gap-2 text-sm text-muted" style="cursor:pointer">
        <input type="checkbox" name="remember"> Remember me
      </label>
    </div>

    <button type="submit" class="btn btn-navy btn-lg" style="width:100%;justify-content:center">
      Sign In
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="{{ url_for('register') }}">Create one</a>
  </div>
</div>

<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
